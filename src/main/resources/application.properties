# Server
server.port=2256
spring.application.name=boardgames-rag-system

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/boardgames_rag
spring.data.mongodb.auto-index-creation=true

# Spring AI - Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=all-minilm:l6
spring.ai.ollama.chat.options.model=llama3.2:3b
spring.ai.ollama.chat.options.num-predict=600
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-ctx=3072

# Qdrant Vector Store
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=boardgames-rag
spring.ai.vectorstore.qdrant.embedding-dimension=384
spring.ai.vectorstore.qdrant.initialize-schema=true

# Timeouts
spring.ai.vectorstore.qdrant.connect-timeout=60s
spring.ai.vectorstore.qdrant.read-timeout=120s

# Enable embedding
spring.ai.embedding.enabled=true

# CSV file paths
app.data.csv.bgg-path=data/bgg_modern_games.csv
app.data.csv.ludii-games-path=data/ludii_games.csv
app.data.csv.ludii-rulesets-path=data/ludii_rulesets.csv

# Logging
logging.level.com.boardgames.rag=DEBUG
logging.level.org.springframework.data.mongodb=INFO
spring.ai.vectorstore.qdrant=INFO

# ==============================================
# CONFIGURATION DES STRATEGIES DE PROMPTING
# ==============================================

# Activation des strategies avancees
app.prompting.strategies.enabled=true
app.prompting.strategies.default=ADAPTIVE

# Timeouts pour chaque strategie (en secondes)
app.prompting.timeout.zero-shot=20
app.prompting.timeout.few-shot=25
app.prompting.timeout.chain-of-thought=30
app.prompting.timeout.self-consistency=35
app.prompting.timeout.meta-prompting=30

# Evaluation comparative
app.prompting.evaluation.enabled=true
app.prompting.evaluation.log-comparisons=true

# Templates configuration
app.prompting.templates.few-shot-examples=3
app.prompting.templates.max-context-games=3

# Seuils pour la selection adaptive
app.prompting.threshold.complex-question-length=100
app.prompting.threshold.min-games-for-few-shot=2

# Logging specifique aux strategies
logging.level.com.boardgames.rag.service.ai.OllamaResponseService=DEBUG
logging.level.com.boardgames.rag.service.rag.RagService=INFO